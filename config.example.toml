bind = "0.0.0.0:8080"
admin_token = "CHANGE_ME"
db_path = "/var/lib/dyson-swarm/state.db"

# Public hostname swarm answers on. When set, every Dyson is reachable at
# `<instance_id>.<hostname>` — the host-based dispatcher forwards those
# requests to the matching CubeSandbox over swarm's private network. The
# SPA's "open ↗" button uses this URL.
#
# Production setup requires:
#   - Wildcard DNS:    *.swarm.example.com → swarm's public IP
#   - Wildcard TLS:    issued via Let's Encrypt DNS-01 (acme-dns, Caddy, etc)
#
# Leave unset to disable per-Dyson UI access; the rest of swarm (API,
# CLI, admin panel) works fine without it.
hostname = "swarm.example.com"

default_ttl_seconds = 86400
health_probe_interval_seconds = 60
health_probe_timeout_seconds = 5

[cube]
url = "http://localhost:3000"
api_key = "CHANGE_ME"
sandbox_domain = "cube.app"

# OIDC user identity.
# Optional — if omitted, /v1/* is reachable only via opaque api keys minted
# through POST /v1/admin/users/:id/keys (CI/admin paths). Most production
# deployments set this section to point at an OIDC issuer (Auth0, Okta,
# Keycloak, Google, etc.).
[oidc]
issuer = "https://accounts.example.com"
audience = "swarm"
# jwks_url override — usually omitted; swarm discovers it from
# <issuer>/.well-known/openid-configuration.
# jwks_url = "https://accounts.example.com/.well-known/jwks.json"
jwks_ttl_seconds = 86400

# Web-UI (SPA) PKCE client. Register `spa_client_id` at the IdP as a
# public client with PKCE enabled and the redirect URI set to wherever
# swarm serves the bundle (typically `https://<swarm-host>/`). The
# SPA discovers authorization_endpoint/token_endpoint by hitting
# `<issuer>/.well-known/openid-configuration` directly.
#
# Leave `spa_client_id` unset to disable the browser flow — admin
# bearers and opaque api keys still work.
spa_client_id = "swarm-spa"
spa_scopes = ["profile", "email"]

# Per-user policy fallback. Applied to any user that doesn't have a row in
# `user_policies`. Tighten via the (forthcoming) admin policy endpoint.
[default_policy]
allowed_providers = ["openrouter"]
allowed_models = ["*"]
daily_token_budget = 1_000_000
monthly_usd_budget = 100.0
rps_limit = 10

[providers.anthropic]
api_key = "CHANGE_ME"
upstream = "https://api.anthropic.com"
anthropic_version = "2023-06-01"

[providers.openai]
api_key = "CHANGE_ME"
upstream = "https://api.openai.com"

[providers.gemini]
api_key = "CHANGE_ME"
upstream = "https://generativelanguage.googleapis.com"

[providers.openrouter]
api_key = "sk-or-CHANGE_ME"
upstream = "https://openrouter.ai/api"

[providers.ollama]
upstream = "http://localhost:11434"

[backup]
sink = "local"
local_cache_dir = "/var/lib/dyson-swarm/backup-cache"

[backup.s3]
endpoint = "https://s3.us-east-1.amazonaws.com"
region = "us-east-1"
bucket = "dyson-backups"
prefix = "swarm/"
access_key_id = "CHANGE_ME"
secret_access_key = "CHANGE_ME"
path_style = false
